<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HobbyHub Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hobby-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .tab-active { color: #4f46e5; transform: scale(1.1); }
        .tab-inactive { color: #94a3b8; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: slideUp 0.4s ease-out forwards; }
        .chat-bubble-me { background-color: #6366f1; color: white; border-radius: 1.25rem 1.25rem 0 1.25rem; }
        .chat-bubble-them { background-color: #f1f5f9; color: #1e293b; border-radius: 1.25rem 1.25rem 1.25rem 0; }
    </style>
</head>
<body>

    <div id="app-root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div style="width: 32px; height: 32px; border: 4px solid #f1f5f9; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: #94a3b8; font-weight: bold; font-size: 14px;">Carregando HobbyHub Local...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, arrayUnion, arrayRemove, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyD2evGU9oz4NvGIH4NllIfaVipFltt8f0Q',
            authDomain: 'hubbyhub-98c71.firebaseapp.com',
            projectId: 'hubbyhub-98c71',
            storageBucket: 'hubbyhub-98c71.firebasestorage.app',
            messagingSenderId: '97040838158',
            appId: '1:97040838158:web:47070af0ff42a9817fd65f'
        };

        const PROJ_ID = 'hubbyhub-98c71';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.state = {
            user: null,
            profile: null,
            posts: [],
            groups: [],
            messages: [],
            privateMessages: [],
            activeTab: 'home',
            view: 'auth',
            authMode: 'login',
            chatView: 'community', // community ou private
            privateTarget: null,
            isActionLoading: false,
            isEditingProfile: false
        };

        onAuthStateChanged(auth, function(user) {
            if (user) {
                window.state.user = user;
                window.state.view = 'app';
                initDatabase(user.uid);
            } else {
                window.state.user = null;
                window.state.view = 'auth';
                render();
            }
        });

        function initDatabase(uid) {
            // Perfil
            onSnapshot(doc(db, 'artifacts', PROJ_ID, 'users', uid, 'profile', 'data'), function(snap) {
                if (snap.exists()) {
                    window.state.profile = snap.data();
                } else {
                    const d = { name: 'Novo Vizinho', avatar: '🎨', location: 'Geral', bio: 'Explorando hobbies próximos.' };
                    setDoc(snap.ref, d);
                    window.state.profile = d;
                }
                render();
            });

            // Posts
            onSnapshot(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'posts'), function(snap) {
                window.state.posts = snap.docs.map(function(d) {
                    var data = d.data(); data.id = d.id; return data;
                }).sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
                render();
            });

            // Grupos
            onSnapshot(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'groups'), function(snap) {
                window.state.groups = snap.docs.map(function(d) {
                    var data = d.data(); data.id = d.id; return data;
                });
                render();
            });

            // Chat Comunitário
            onSnapshot(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'messages'), function(snap) {
                window.state.messages = snap.docs.map(function(d) {
                    var data = d.data(); data.id = d.id; return data;
                }).sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
                render();
            });

            // Chat Privado
            onSnapshot(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'private_messages'), function(snap) {
                window.state.privateMessages = snap.docs.map(function(d) {
                    var data = d.data(); data.id = d.id; return data;
                }).sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
                render();
            });
        }

        // AUTH
        window.handleAuth = async function(e) {
            e.preventDefault();
            const email = e.target.email.value;
            const pass = e.target.password.value;
            window.state.isActionLoading = true; render();
            try {
                if (window.state.authMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    const name = e.target.name.value;
                    const loc = e.target.location.value;
                    await setDoc(doc(db, 'artifacts', PROJ_ID, 'users', res.user.uid, 'profile', 'data'), {
                        name: name, avatar: '🎨', location: loc, bio: 'Novo entusiasta local!'
                    });
                }
            } catch (err) { alert(err.message); }
            finally { window.state.isActionLoading = false; render(); }
        };

        window.toggleAuthMode = function() { window.state.authMode = window.state.authMode === 'login' ? 'register' : 'login'; render(); };
        window.logout = function() { signOut(auth); };

        // APP ACTIONS
        window.changeTab = function(t) { window.state.activeTab = t; render(); };
        window.toggleEditProfile = function() { window.state.isEditingProfile = !window.state.isEditingProfile; render(); };
        
        window.updateProfile = async function(e) {
            e.preventDefault();
            const name = e.target.name.value;
            const loc = e.target.location.value;
            const bio = e.target.bio.value;
            const avatar = e.target.avatar.value;
            window.state.isActionLoading = true; render();
            try {
                await updateDoc(doc(db, 'artifacts', PROJ_ID, 'users', window.state.user.uid, 'profile', 'data'), {
                    name: name, location: loc, bio: bio, avatar: avatar
                });
                window.state.isEditingProfile = false;
            } catch (err) { alert(err.message); }
            finally { window.state.isActionLoading = false; render(); }
        };

        window.createGroup = async function(e) {
            e.preventDefault();
            const name = e.target.name.value;
            const hobby = e.target.hobby.value;
            const desc = e.target.description.value;
            window.state.isActionLoading = true; render();
            try {
                await addDoc(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'groups'), {
                    name: name, hobby: hobby, description: desc, location: window.state.profile.location,
                    members: [window.state.user.uid], createdAt: Date.now()
                });
                window.state.activeTab = 'search';
            } catch (err) { alert(err.message); }
            finally { window.state.isActionLoading = false; render(); }
        };

        window.sendChatMessage = async function(e) {
            e.preventDefault();
            const msg = e.target.message.value;
            if (!msg) return;
            e.target.message.value = '';
            const coll = window.state.chatView === 'community' ? 'messages' : 'private_messages';
            const data = {
                senderId: window.state.user.uid,
                senderName: window.state.profile.name,
                text: msg,
                createdAt: Date.now()
            };
            if (window.state.chatView === 'private') {
                data.receiverId = window.state.privateTarget.id;
                data.chatId = [window.state.user.uid, window.state.privateTarget.id].sort().join('_');
            } else {
                data.location = window.state.profile.location;
            }
            await addDoc(collection(db, 'artifacts', PROJ_ID, 'public', 'data', coll), data);
        };

        window.startPrivateChat = function(id, name) {
            if (id === window.state.user.uid) return;
            window.state.privateTarget = { id: id, name: name };
            window.state.chatView = 'private';
            window.state.activeTab = 'chat';
            render();
        };

        window.setChatView = function(v) { window.state.chatView = v; if (v === 'community') window.state.privateTarget = null; render(); };

        window.toggleLike = async function(id, likes) {
            const ref = doc(db, 'artifacts', PROJ_ID, 'public', 'data', 'posts', id);
            const isLiked = likes && likes.indexOf(window.state.user.uid) > -1;
            await updateDoc(ref, { likes: isLiked ? arrayRemove(window.state.user.uid) : arrayUnion(window.state.user.uid) });
        };

        window.publishPost = async function(e) {
            e.preventDefault();
            const content = e.target.content.value;
            const hobby = e.target.hobby.value;
            window.state.isActionLoading = true; render();
            try {
                await addDoc(collection(db, 'artifacts', PROJ_ID, 'public', 'data', 'posts'), {
                    userId: window.state.user.uid,
                    userName: window.state.profile.name,
                    userAvatar: window.state.profile.avatar,
                    location: window.state.profile.location,
                    content: content,
                    hobby: hobby,
                    likes: [],
                    createdAt: Date.now()
                });
                window.state.activeTab = 'home';
            } catch (err) { alert(err.message); }
            finally { window.state.isActionLoading = false; render(); }
        };

        // RENDER
        function render() {
            const root = document.getElementById('app-root');
            const s = window.state;
            if (s.view === 'auth') { root.innerHTML = renderAuth(s); }
            else { if (!s.profile) return; root.innerHTML = renderApp(s); }
            lucide.createIcons();
        }

        function renderAuth(s) {
            var h = '<div class="min-h-screen flex items-center justify-center p-6 bg-slate-50"><div class="w-full max-w-sm bg-white rounded-[2.5rem] p-8 shadow-xl text-center">';
            h += '<h1 class="text-3xl font-black text-indigo-600 mb-2 italic">HobbyHub</h1><p class="text-slate-400 text-sm mb-8">' + (s.authMode === 'login' ? 'Entre na sua conta' : 'Crie sua conta local') + '</p>';
            h += '<form onsubmit="window.handleAuth(event)" class="space-y-4 text-left">';
            if (s.authMode === 'register') {
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nome</label><input name="name" required class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner"></div>';
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Localidade (Cidade/Bairro)</label><input name="location" required placeholder="Ex: Cabo Frio" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner"></div>';
            }
            h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">E-mail</label><input name="email" type="email" required class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner"></div>';
            h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Senha</label><input name="password" type="password" required class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner"></div>';
            h += '<button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 mt-4">' + (s.isActionLoading ? 'Carregando...' : (s.authMode === 'login' ? 'Entrar' : 'Cadastrar')) + '</button></form>';
            h += '<button onclick="window.toggleAuthMode()" class="mt-6 text-xs font-bold text-slate-400 uppercase tracking-widest">' + (s.authMode === 'login' ? 'Criar uma conta' : 'Já tenho conta') + '</button></div></div>';
            return h;
        }

        function renderApp(s) {
            var h = '<div class="min-h-screen max-w-md mx-auto bg-white flex flex-col shadow-2xl relative overflow-hidden">';
            h += '<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 px-4 py-3 flex justify-between items-center">';
            h += '<h1 class="text-2xl font-black text-indigo-600 italic">HobbyHub</h1><div class="flex gap-4 items-center"><i data-lucide="plus-square" onclick="window.changeTab(\'add\')" class="w-6 h-6 text-slate-800 cursor-pointer"></i><i data-lucide="message-square" onclick="window.changeTab(\'chat\')" class="w-6 h-6 text-slate-800 cursor-pointer"></i></div></header>';
            h += '<main class="flex-1 overflow-y-auto pb-24 no-scrollbar">';
            if (s.activeTab === 'home') h += renderHome(s);
            else if (s.activeTab === 'search') h += renderSearch(s);
            else if (s.activeTab === 'add') h += renderAdd(s);
            else if (s.activeTab === 'chat') h += renderChat(s);
            else if (s.activeTab === 'profile') h += renderProfile(s);
            h += '</main>';
            h += '<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-100 flex justify-around py-3 z-50 shadow-lg">';
            const icons = ['home', 'search', 'plus-square', 'message-circle', 'user'];
            const tabs = ['home', 'search', 'add', 'chat', 'profile'];
            for(var i=0; i<5; i++) { h += '<button onclick="window.changeTab(\'' + tabs[i] + '\')" class="' + (s.activeTab === tabs[i] ? 'tab-active' : 'tab-inactive') + ' transition-all"><i data-lucide="' + icons[i] + '"></i></button>'; }
            h += '</nav></div>';
            return h;
        }

        function renderHome(s) {
            var h = '<div class="p-4 bg-indigo-50 border-b border-indigo-100 flex justify-between items-center"><div class="flex items-center gap-2"><i data-lucide="map-pin" class="text-indigo-600 w-4 h-4"></i><span class="text-xs font-black text-indigo-900 uppercase">Pessoas em ' + s.profile.location + '</span></div><button onclick="window.changeTab(\'profile\')" class="text-[10px] font-bold text-indigo-600 underline">Mudar</button></div>';
            h += '<div class="divide-y divide-slate-100">';
            const localPosts = s.posts.filter(function(p){ return p.location === s.profile.location; });
            if (localPosts.length === 0) { h += '<div class="py-24 text-center px-10 text-slate-400 text-xs font-bold">Nenhum post em ' + s.profile.location + ' ainda. Seja o primeiro!</div>'; }
            else { localPosts.forEach(function(p) {
                const liked = p.likes && p.likes.indexOf(s.user.uid) > -1;
                h += '<article class="bg-white pb-4 animate-card"><div class="p-3 flex items-center justify-between"><div class="flex items-center gap-3 cursor-pointer" onclick="window.startPrivateChat(\'' + p.userId + '\',\'' + p.userName + '\')"><div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-[10px] font-bold">' + (p.userAvatar || '👤') + '</div><div><p class="text-xs font-bold text-slate-900">' + p.userName + '</p><p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter">' + p.hobby + '</p></div></div></div>';
                h += '<div class="aspect-square w-full hobby-gradient flex items-center justify-center p-12 text-center relative shadow-inner"><p class="text-xl font-black text-white leading-tight italic">"' + p.content + '"</p></div>';
                h += '<div class="p-3"><div class="flex justify-between items-center mb-2"><div class="flex gap-4"><button onclick="window.toggleLike(\'' + p.id + '\',' + JSON.stringify(p.likes || []) + ')"><i data-lucide="heart" class="w-6 h-6 ' + (liked ? 'fill-red-500 text-red-500' : 'text-slate-800') + '"></i></button><i data-lucide="message-circle" class="w-6 h-6 text-slate-800" onclick="window.startPrivateChat(\'' + p.userId + '\',\'' + p.userName + '\')"></i></div></div><p class="text-xs font-black text-slate-900">' + (p.likes ? p.likes.length : 0) + ' gostos</p></div></article>';
            }); }
            h += '</div>';
            return h;
        }

        function renderSearch(s) {
            var h = '<div class="p-4 space-y-6"><h2 class="text-2xl font-black text-slate-900">Grupos em ' + s.profile.location + '</h2>';
            h += '<div class="grid gap-3">';
            const localGroups = s.groups.filter(function(g){ return g.location === s.profile.location; });
            localGroups.forEach(function(g) {
                h += '<div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm"><div class="flex items-center gap-3"><div class="w-12 h-12 hobby-gradient rounded-2xl flex items-center justify-center text-white font-black text-sm">' + g.hobby.charAt(0) + '</div><div><h4 class="text-sm font-bold text-slate-800">' + g.name + '</h4><p class="text-[10px] text-slate-400">' + (g.members ? g.members.length : 0) + ' membros</p></div></div><i data-lucide="users" class="text-indigo-600 w-5 h-5"></i></div>';
            });
            if(localGroups.length === 0) h += '<p class="text-center text-xs text-slate-300 py-10 font-bold uppercase tracking-widest">Nenhum grupo aqui ainda.</p>';
            h += '</div><div class="pt-6 border-t border-slate-100"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Criar Novo Grupo</h3>';
            h += '<form onsubmit="window.createGroup(event)" class="space-y-3"><input name="name" placeholder="Nome do Grupo" required class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner">';
            h += '<input name="hobby" placeholder="Qual o Hobby?" required class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner">';
            h += '<textarea name="description" placeholder="Sobre o grupo..." class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner"></textarea>';
            h += '<button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black shadow-lg shadow-indigo-100">' + (s.isActionLoading ? 'Criando...' : 'Criar Grupo em ' + s.profile.location) + '</button></form></div></div>';
            return h;
        }

        function renderAdd(s) {
            var h = '<div class="p-6 bg-white"><h2 class="text-2xl font-black text-slate-900 mb-6 tracking-tight">Postar para ' + s.profile.location + '</h2>';
            h += '<form onsubmit="window.publishPost(event)" class="space-y-6"><div><textarea name="content" rows="4" placeholder="O que andas a fazer?" class="w-full bg-slate-50 rounded-3xl p-5 text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 border-none resize-none shadow-inner" required></textarea></div>';
            h += '<div><select name="hobby" class="w-full bg-slate-50 rounded-2xl p-4 text-sm font-bold outline-none border-none shadow-inner"><option>Artes</option><option>Desporto</option><option>Culinária</option><option>Games</option></select></div>';
            h += '<button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-xl shadow-indigo-100">' + (s.isActionLoading ? 'Postando...' : 'Publicar Agora') + '</button></form></div>';
            return h;
        }

        function renderChat(s) {
            var h = '<div class="flex flex-col h-full bg-white"><div class="p-4 border-b border-slate-100 flex gap-2">';
            h += '<button onclick="window.setChatView(\'community\')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ' + (s.chatView === 'community' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-400') + '">Comunidade</button>';
            h += '<button onclick="window.setChatView(\'private\')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ' + (s.chatView === 'private' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-400') + '">Privado' + (s.privateTarget ? ': ' + s.privateTarget.name : '') + '</button></div>';
            h += '<div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar" id="chat-messages">';
            
            const msgs = s.chatView === 'community' ? s.messages.filter(function(m){ return m.location === s.profile.location; }) : s.privateMessages.filter(function(m){ 
                const cid = [s.user.uid, s.privateTarget?.id].sort().join('_');
                return m.chatId === cid;
            });

            if (msgs.length === 0) h += '<div class="py-20 text-center text-slate-300 text-[10px] font-black uppercase tracking-widest">Nenhuma mensagem aqui...</div>';
            msgs.forEach(function(m) {
                const isMe = m.senderId === s.user.uid;
                h += '<div class="flex ' + (isMe ? 'justify-end' : 'justify-start') + ' animate-card"><div class="max-w-[80%] ' + (isMe ? 'chat-bubble-me' : 'chat-bubble-them') + ' p-3 shadow-sm">';
                if (!isMe && s.chatView === 'community') h += '<p class="text-[8px] font-black uppercase mb-1 opacity-50 cursor-pointer" onclick="window.startPrivateChat(\'' + m.senderId + '\',\'' + m.senderName + '\')">' + m.senderName + '</p>';
                h += '<p class="text-sm font-medium">' + m.text + '</p></div></div>';
            });
            h += '</div><form onsubmit="window.sendChatMessage(event)" class="p-4 border-t border-slate-100 flex gap-2 bg-white sticky bottom-0"><input name="message" placeholder="Diga algo..." class="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none border-none shadow-inner"><button type="submit" class="bg-indigo-600 text-white p-3 rounded-xl shadow-lg"><i data-lucide="send" class="w-4 h-4"></i></button></form></div>';
            return h;
        }

        function renderProfile(s) {
            if (s.isEditingProfile) {
                var h = '<div class="p-6 bg-white"><h2 class="text-2xl font-black mb-6">Editar Perfil</h2><form onsubmit="window.updateProfile(event)" class="space-y-4">';
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase">Seu Avatar (Emoji)</label><input name="avatar" value="' + s.profile.avatar + '" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none shadow-inner"></div>';
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase">Nome</label><input name="name" value="' + s.profile.name + '" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none shadow-inner"></div>';
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase">Localização (Cidade/Bairro)</label><input name="location" value="' + s.profile.location + '" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none shadow-inner"></div>';
                h += '<div><label class="text-[10px] font-bold text-slate-400 uppercase">Biografia</label><textarea name="bio" class="w-full bg-slate-50 rounded-xl p-3 text-sm font-bold border-none outline-none shadow-inner">' + s.profile.bio + '</textarea></div>';
                h += '<button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg">' + (s.isActionLoading ? 'Salvando...' : 'Salvar Alterações') + '</button>';
                h += '<button type="button" onclick="window.toggleEditProfile()" class="w-full text-xs font-bold text-slate-400 uppercase py-2">Cancelar</button></form></div>';
                return h;
            }
            const myPosts = s.posts.filter(function(p){ return p.userId === s.user.uid; });
            var h = '<div class="bg-white"><div class="p-8 text-center bg-slate-50/50"><div class="w-24 h-24 bg-indigo-600 rounded-[2.5rem] mx-auto flex items-center justify-center text-4xl shadow-2xl shadow-indigo-100 border-4 border-white mb-4">' + s.profile.avatar + '</div><h3 class="text-xl font-black text-slate-900">' + s.profile.name + '</h3><p class="text-[10px] text-indigo-600 font-black uppercase tracking-widest mt-1">' + s.profile.location + '</p><p class="text-xs text-slate-500 font-medium mt-3 px-10">' + s.profile.bio + '</p>';
            h += '<div class="flex justify-center gap-10 mt-8 py-6 border-t border-slate-100"><div><p class="text-xl font-black text-slate-900">' + myPosts.length + '</p><p class="text-[9px] text-slate-400 font-black uppercase">Posts</p></div><div><p class="text-xl font-black text-slate-900">' + s.groups.length + '</p><p class="text-[9px] text-slate-400 font-black uppercase">Grupos</p></div></div>';
            h += '<div class="flex gap-2 p-4"><button onclick="window.toggleEditProfile()" class="flex-1 bg-white border border-slate-200 py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm">Editar Perfil</button><button onclick="window.logout()" class="px-6 bg-red-50 text-red-500 rounded-xl text-xs font-black uppercase">Sair</button></div></div>';
            h += '<div class="p-2 grid grid-cols-3 gap-1">';
            myPosts.forEach(function(){ h += '<div class="aspect-square hobby-gradient rounded-lg opacity-30"></div>'; });
            h += '</div></div>';
            return h;
        }

        window.onload = render;
    </script>
</body>
</html>
