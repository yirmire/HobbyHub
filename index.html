<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HobbyHub Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuração Firebase ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hobby-hub-local';

        // --- Estado da Aplicação ---
        let state = {
            user: null,
            activeTab: 'discovery', // discovery, groups, market, profile
            groups: [],
            events: [],
            marketItems: [],
            userProfile: null,
            selectedGroup: null
        };

        // --- Funções de UI ---
        function updateUI() {
            const root = document.getElementById('app-root');
            if (state.activeTab === 'loading') {
                root.innerHTML = renderLoading();
            } else {
                root.innerHTML = `
                    <div class="min-h-screen bg-slate-50 max-w-md mx-auto relative shadow-2xl overflow-x-hidden pb-24">
                        ${renderHeader()}
                        <main>
                            ${renderActiveTab()}
                        </main>
                        ${renderBottomNav()}
                        ${state.selectedGroup ? renderGroupDetail() : ''}
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderLoading() {
            return `
                <div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                    <p class="text-slate-500 font-medium animate-pulse">A carregar o seu mundo local...</p>
                </div>
            `;
        }

        function renderHeader() {
            if (state.activeTab === 'discovery') {
                return `
                    <header class="px-4 pt-6 mb-4">
                        <h1 class="text-2xl font-bold text-slate-900">Descobrir Local</h1>
                        <p class="text-slate-500 text-sm">Hobbies perto de si em ${state.userProfile?.location || 'A localizar...'}</p>
                        <div class="mt-4 flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                            ${['Todos', 'Esportes', 'Artes', 'Games', 'Jardim'].map(cat => `
                                <button class="whitespace-nowrap px-4 py-2 bg-white border border-slate-100 rounded-full text-sm font-medium hover:bg-indigo-50 hover:text-indigo-600 transition-colors shadow-sm">
                                    ${cat}
                                </button>
                            `).join('')}
                        </div>
                    </header>
                `;
            }
            return '';
        }

        function renderActiveTab() {
            switch(state.activeTab) {
                case 'discovery': return renderDiscovery();
                case 'groups': return renderGroups();
                case 'market': return renderMarket();
                case 'profile': return renderProfile();
                default: return '';
            }
        }

        function renderDiscovery() {
            return `
                <section class="px-4 space-y-6">
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-bold text-lg">Grupos Sugeridos</h2>
                            <button class="text-indigo-600 text-sm font-semibold">Ver todos</button>
                        </div>
                        <div class="grid gap-4">
                            ${state.groups.length === 0 ? `
                                <div class="p-8 text-center bg-white rounded-2xl border-2 border-dashed border-slate-200">
                                    <i data-lucide="users" class="mx-auto h-12 w-12 text-slate-300 mb-2"></i>
                                    <p class="text-slate-500 text-sm">Nenhum grupo encontrado. Comece a sua comunidade!</p>
                                    <button onclick="window.createDemoGroup()" class="mt-3 text-indigo-600 font-bold text-sm">Criar Grupo Exemplo</button>
                                </div>
                            ` : state.groups.map(g => `
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 cursor-pointer" onclick="window.selectGroup('${g.id}')">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold uppercase">${g.hobby}</span>
                                        <span class="text-[10px] text-slate-400 flex items-center"><i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> 1.2km</span>
                                    </div>
                                    <h3 class="font-bold text-slate-800">${g.name}</h3>
                                    <p class="text-xs text-slate-500 mt-1 line-clamp-1">${g.description}</p>
                                    <div class="mt-4 flex items-center justify-between">
                                        <div class="flex -space-x-2">
                                            <div class="w-7 h-7 rounded-full bg-indigo-100 border-2 border-white flex items-center justify-center text-[8px] font-bold text-indigo-600">+${g.members?.length || 0}</div>
                                        </div>
                                        <button onclick="event.stopPropagation(); window.joinGroup('${g.id}')" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold">Participar</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div>
                        <h2 class="font-bold text-lg mb-4">Eventos Próximos</h2>
                        <div class="space-y-3">
                            ${state.events.map(e => `
                                <div class="flex gap-4 p-3 bg-white border border-slate-100 rounded-2xl shadow-sm">
                                    <div class="flex-shrink-0 w-14 h-14 bg-indigo-50 rounded-xl flex flex-col items-center justify-center text-indigo-600">
                                        <span class="text-[10px] font-bold uppercase">${new Date(e.date).toLocaleDateString('pt-PT', {month:'short'})}</span>
                                        <span class="text-lg font-black">${new Date(e.date).getDate()}</span>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h4 class="font-bold text-slate-800 truncate text-sm">${e.title}</h4>
                                        <p class="text-[10px] text-slate-400 flex items-center gap-1 mt-0.5">
                                            <i data-lucide="clock" class="w-3 h-3"></i> ${e.time || '18:00'} • <i data-lucide="map-pin" class="w-3 h-3"></i> ${e.location}
                                        </p>
                                        <div class="mt-1.5">
                                            <span class="px-2 py-0.5 bg-green-50 text-green-600 rounded-full text-[9px] font-bold">${e.attendees?.length || 0} confirmados</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                            ${state.events.length === 0 ? `
                                <button onclick="window.createDemoEvent()" class="w-full py-4 text-slate-400 border-2 border-dashed rounded-2xl text-xs font-medium">
                                    + Criar primeiro evento
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderGroups() {
            const myGroups = state.groups.filter(g => g.members?.includes(state.user?.uid));
            return `
                <div class="p-4 space-y-4">
                    <h1 class="text-2xl font-bold text-slate-900">Meus Grupos</h1>
                    ${myGroups.length === 0 ? `
                        <div class="py-20 text-center opacity-40">
                            <i data-lucide="users" class="mx-auto w-16 h-16 mb-4"></i>
                            <p>Ainda não faz parte de nenhum grupo.</p>
                        </div>
                    ` : myGroups.map(g => `
                        <div class="bg-white p-4 rounded-2xl border flex items-center justify-between" onclick="window.selectGroup('${g.id}')">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                                    <i data-lucide="users"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold">${g.name}</h3>
                                    <p class="text-xs text-slate-400">${g.members?.length} membros • Ativo agora</p>
                                </div>
                            </div>
                            <i data-lucide="message-square" class="text-indigo-300"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderMarket() {
            return `
                <div class="p-4 space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold">Mercado Hobby</h1>
                            <p class="text-slate-500 text-sm">Monetize o seu talento local</p>
                        </div>
                        <button onclick="window.createDemoProduct()" class="bg-indigo-600 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        ${state.marketItems.map(item => `
                            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                                <div class="aspect-square bg-slate-100 flex items-center justify-center text-slate-300">
                                    <i data-lucide="shopping-bag" class="w-12 h-12"></i>
                                </div>
                                <div class="p-3">
                                    <p class="text-[9px] font-bold text-indigo-500 uppercase">${item.category}</p>
                                    <h3 class="font-bold text-xs truncate">${item.title}</h3>
                                    <div class="flex items-center justify-between mt-2">
                                        <span class="font-black text-indigo-600 text-sm">€${item.price}</span>
                                        <i data-lucide="heart" class="w-4 h-4 text-slate-300"></i>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderProfile() {
            return `
                <div class="p-4 space-y-6">
                    <div class="flex items-center gap-4 py-6">
                        <div class="w-20 h-20 rounded-2xl bg-indigo-600 text-white flex items-center justify-center text-3xl font-black shadow-xl">
                            ${state.userProfile?.name?.charAt(0)}
                        </div>
                        <div>
                            <h2 class="text-xl font-bold">${state.userProfile?.name}</h2>
                            <p class="text-xs text-slate-400 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${state.userProfile?.location}</p>
                            <div class="flex gap-1 mt-2">
                                ${state.userProfile?.hobbies?.map(h => `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold">${h}</span>`).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="bg-indigo-900 rounded-3xl p-6 text-white relative overflow-hidden">
                        <div class="relative z-10">
                            <h4 class="font-bold">Profissionalize-se</h4>
                            <p class="text-xs text-indigo-200 mt-1">Transforme o seu passatempo num negócio local com as nossas ferramentas.</p>
                            <button class="mt-4 bg-white text-indigo-900 px-4 py-2 rounded-xl text-xs font-bold">Ver Planos</button>
                        </div>
                        <i data-lucide="store" class="absolute -right-4 -bottom-4 w-24 h-24 opacity-10"></i>
                    </div>

                    <div class="space-y-2">
                         <h3 class="font-bold text-slate-800 text-sm">Definições</h3>
                         <div class="bg-white rounded-2xl border divide-y">
                            <div class="p-4 flex justify-between items-center text-sm font-medium">
                                <div class="flex items-center gap-3"><i data-lucide="settings" class="w-4 h-4 text-slate-400"></i> Conta</div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </div>
                            <div class="p-4 flex justify-between items-center text-sm font-medium">
                                <div class="flex items-center gap-3"><i data-lucide="store" class="w-4 h-4 text-slate-400"></i> Marketplace</div>
                                <span class="bg-orange-100 text-orange-600 text-[8px] font-bold px-1.5 py-0.5 rounded">BETA</span>
                            </div>
                         </div>
                    </div>
                </div>
            `;
        }

        function renderGroupDetail() {
            const g = state.selectedGroup;
            return `
                <div class="fixed inset-0 z-40 bg-white max-w-md mx-auto overflow-y-auto">
                    <div class="sticky top-0 bg-white/80 backdrop-blur-md p-4 flex items-center gap-3 border-b z-50">
                        <button onclick="window.closeGroupDetail()" class="p-1"><i data-lucide="chevron-left"></i></button>
                        <h2 class="font-bold truncate text-sm">${g.name}</h2>
                    </div>
                    <div class="p-4 space-y-6">
                        <div class="h-40 bg-indigo-600 rounded-3xl relative overflow-hidden shadow-inner">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                            <div class="absolute bottom-4 left-4 text-white">
                                <span class="text-[10px] font-bold uppercase tracking-wider opacity-80">${g.hobby}</span>
                                <h3 class="text-xl font-bold">${g.name}</h3>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1 p-3 bg-slate-50 rounded-2xl text-center border">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Membros</p>
                                <p class="text-lg font-black">${g.members?.length || 0}</p>
                            </div>
                            <div class="flex-1 p-3 bg-slate-50 rounded-2xl text-center border">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">Posts</p>
                                <p class="text-lg font-black">12</p>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <h4 class="font-bold">Mural da Comunidade</h4>
                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 italic text-slate-400 text-sm">
                                Comece uma conversa com os seus vizinhos entusiastas...
                            </div>
                        </div>
                        <button onclick="window.joinGroup('${g.id}')" class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100">
                            ${g.members?.includes(state.user?.uid) ? 'Já sou Membro' : 'Participar Agora'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderBottomNav() {
            const tabs = [
                { id: 'discovery', icon: 'map', label: 'Explorar' },
                { id: 'groups', icon: 'users', label: 'Grupos' },
                { id: 'market', icon: 'shopping-bag', label: 'Mercado' },
                { id: 'profile', icon: 'user', label: 'Perfil' }
            ];
            return `
                <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-lg border-t flex justify-around py-3 px-2 z-50">
                    ${tabs.map(t => `
                        <button onclick="window.switchTab('${t.id}')" class="flex flex-col items-center gap-1 transition-all ${state.activeTab === t.id ? 'text-indigo-600 scale-110' : 'text-slate-400'}">
                            <i data-lucide="${t.icon}" class="w-6 h-6 ${state.activeTab === t.id ? 'fill-indigo-600/10' : ''}"></i>
                            <span class="text-[9px] font-bold uppercase tracking-tighter">${t.label}</span>
                        </button>
                    `).join('')}
                </nav>
            `;
        }

        // --- Lógica de Negócio ---
        window.switchTab = (tabId) => {
            state.activeTab = tabId;
            state.selectedGroup = null;
            updateUI();
        };

        window.selectGroup = (groupId) => {
            state.selectedGroup = state.groups.find(g => g.id === groupId);
            updateUI();
        };

        window.closeGroupDetail = () => {
            state.selectedGroup = null;
            updateUI();
        };

        window.joinGroup = async (groupId) => {
            if (!state.user) return;
            try {
                const groupRef = doc(db, 'artifacts', appId, 'public', 'data', 'groups', groupId);
                await updateDoc(groupRef, {
                    members: arrayUnion(state.user.uid)
                });
            } catch (e) {
                console.error("Erro ao aderir ao grupo:", e);
            }
        };

        window.createDemoGroup = async () => {
            if (!state.user) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'groups'), {
                name: "Clube da Fotografia Urbana",
                hobby: "Fotografia",
                description: "Grupo para explorar as ruas e capturar momentos únicos.",
                creatorId: state.user.uid,
                members: [state.user.uid],
                location: state.userProfile.location,
                createdAt: new Date().toISOString()
            });
        };

        window.createDemoEvent = async () => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'events'), {
                title: "Encontro de Boardgames no Parque",
                date: new Date(Date.now() + 86400000 * 3).toISOString(),
                location: "Jardim Central",
                attendees: [state.user?.uid],
                hobby: "Games"
            });
        };

        window.createDemoProduct = async () => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'marketplace'), {
                title: "Kit de Pincéis Artesanais",
                price: "24.90",
                category: "Artes",
                sellerId: state.user?.uid,
                description: "Feitos à mão para aquarelistas iniciantes."
            });
        };

        // --- Inicialização ---
        window.onload = async () => {
            updateUI();
            
            // Auth
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }

            onAuthStateChanged(auth, (u) => {
                state.user = u;
                if (u) {
                    setupListeners(u.uid);
                }
            });
        };

        function setupListeners(uid) {
            // Perfil
            const profileRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');
            onSnapshot(profileRef, (snap) => {
                if (snap.exists()) {
                    state.userProfile = snap.data();
                } else {
                    const data = { name: "Hobby Enthusiast", hobbies: ["Arte", "Ciclismo"], location: "Lisboa, PT" };
                    setDoc(profileRef, data);
                    state.userProfile = data;
                }
                updateUI();
            }, (e) => console.error(e));

            // Grupos
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'groups'), (snap) => {
                state.groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            }, (e) => console.error(e));

            // Eventos
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), (snap) => {
                state.events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            }, (e) => console.error(e));

            // Mercado
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'marketplace'), (snap) => {
                state.marketItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            }, (e) => console.error(e));
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        main { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-200 antialiased">
    <div id="app-root"></div>
</body>
</html>
