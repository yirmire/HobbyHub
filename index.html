<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HobbyHub Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuração Firebase Integrada ---
        const firebaseConfig = {
            apiKey: "AIzaSyD2evGU9oz4NvGIH4NllIfaVipFltt8f0Q",
            authDomain: "hubbyhub-98c71.firebaseapp.com",
            projectId: "hubbyhub-98c71",
            storageBucket: "hubbyhub-98c71.firebasestorage.app",
            messagingSenderId: "97040838158",
            appId: "1:97040838158:web:47070af0ff42a9817fd65f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'hubbyhub-98c71';

        // --- Estado Global ---
        window.state = {
            user: null,
            activeTab: 'loading',
            groups: [],
            events: [],
            marketItems: [],
            userProfile: null,
            selectedGroup: null
        };

        // --- Funções de Renderização (Corrigidas) ---
        function updateUI() {
            const root = document.getElementById('app-root');
            const s = window.state;

            if (s.activeTab === 'loading') {
                root.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-slate-50"><div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>`;
                return;
            }

            root.innerHTML = `
                <div class="min-h-screen bg-slate-50 max-w-md mx-auto relative shadow-2xl overflow-x-hidden pb-24 font-sans">
                    ${renderHeader(s)}
                    <main class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        ${renderContent(s)}
                    </main>
                    ${renderBottomNav(s)}
                    ${s.selectedGroup ? renderGroupDetail(s) : ''}
                </div>
            `;
            lucide.createIcons();
        }

        function renderHeader(s) {
            if (s.activeTab !== 'discovery') return '';
            return `
                <header class="px-4 pt-6 mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <h1 class="text-2xl font-black text-indigo-600">HobbyHub</h1>
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs border border-indigo-200">
                            ${s.userProfile?.name?.charAt(0) || 'U'}
                        </div>
                    </div>
                    <p class="text-slate-500 text-sm flex items-center gap-1">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> Próximo de ${s.userProfile?.location || 'Localizar...'}
                    </p>
                </header>
            `;
        }

        function renderContent(s) {
            switch(s.activeTab) {
                case 'discovery': return renderDiscovery(s);
                case 'groups': return renderGroups(s);
                case 'market': return renderMarket(s);
                case 'profile': return renderProfile(s);
                default: return '';
            }
        }

        function renderDiscovery(s) {
            return `
                <div class="px-4 space-y-8">
                    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        ${['Todos', 'Esportes', 'Artes', 'Games'].map(c => `<button class="px-4 py-2 bg-white rounded-full text-xs font-bold shadow-sm border border-slate-100 whitespace-nowrap">${c}</button>`).join('')}
                    </div>
                    
                    <section>
                        <h2 class="font-bold text-slate-800 mb-4">Grupos Sugeridos</h2>
                        <div class="grid gap-4">
                            ${s.groups.length === 0 ? `
                                <div class="p-8 text-center border-2 border-dashed rounded-3xl bg-white/50" onclick="window.createDemoGroup()">
                                    <i data-lucide="plus-circle" class="mx-auto text-slate-300 mb-2"></i>
                                    <p class="text-xs text-slate-400 font-medium italic">Nenhum grupo aqui. Toque para criar um!</p>
                                </div>
                            ` : s.groups.map(g => `
                                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100" onclick="window.selectGroup('${g.id}')">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black uppercase tracking-wider">${g.hobby}</span>
                                        <span class="text-[10px] text-slate-400 font-medium">1.2 km</span>
                                    </div>
                                    <h3 class="font-bold text-slate-900">${g.name}</h3>
                                    <div class="mt-4 flex items-center justify-between">
                                        <div class="flex -space-x-2">
                                            <div class="w-7 h-7 rounded-full bg-slate-200 border-2 border-white flex items-center justify-center text-[8px] font-bold">+${g.members?.length || 0}</div>
                                        </div>
                                        <button class="bg-indigo-600 text-white px-4 py-1.5 rounded-xl text-xs font-bold active:scale-95 transition-transform" onclick="event.stopPropagation(); window.joinGroup('${g.id}')">Participar</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <section>
                        <h2 class="font-bold text-slate-800 mb-4">Eventos Próximos</h2>
                        <div class="space-y-3">
                            ${s.events.map(e => `
                                <div class="bg-white p-3 rounded-2xl flex gap-4 border border-slate-100 shadow-sm">
                                    <div class="w-12 h-12 bg-indigo-600 text-white rounded-xl flex flex-col items-center justify-center leading-none">
                                        <span class="text-[8px] font-bold opacity-70 uppercase">${new Date(e.date).toLocaleDateString('pt', {month:'short'})}</span>
                                        <span class="text-lg font-black">${new Date(e.date).getDate()}</span>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-sm text-slate-800">${e.title}</h4>
                                        <p class="text-[10px] text-slate-400 mt-0.5">${e.location}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderGroups(s) {
            const mine = s.groups.filter(g => g.members?.includes(s.user?.uid));
            return `
                <div class="p-4 space-y-4">
                    <h2 class="text-xl font-black text-slate-900">Meus Grupos</h2>
                    ${mine.length === 0 ? `<div class="py-20 text-center text-slate-300 font-medium text-sm">Não pertences a nenhum grupo ainda.</div>` : 
                    mine.map(g => `
                        <div class="bg-white p-4 rounded-3xl border flex items-center justify-between shadow-sm" onclick="window.selectGroup('${g.id}')">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i data-lucide="users" class="w-5 h-5"></i></div>
                                <div><h4 class="font-bold text-sm">${g.name}</h4><p class="text-[10px] text-slate-400">${g.members?.length} membros</p></div>
                            </div>
                            <i data-lucide="chevron-right" class="text-slate-300 w-4 h-4"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderMarket(s) {
            return `
                <div class="p-4 space-y-6">
                    <div class="flex justify-between items-center"><h2 class="text-xl font-black">Mercado Local</h2><button onclick="window.createDemoProduct()" class="bg-indigo-600 text-white p-2 rounded-full shadow-lg"><i data-lucide="plus" class="w-5 h-5"></i></button></div>
                    <div class="grid grid-cols-2 gap-4">
                        ${s.marketItems.map(i => `
                            <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                                <div class="aspect-square bg-slate-100 flex items-center justify-center text-slate-300"><i data-lucide="shopping-bag" class="w-10 h-10"></i></div>
                                <div class="p-3">
                                    <p class="text-[8px] font-bold text-indigo-500 uppercase tracking-tighter">${i.category}</p>
                                    <h4 class="font-bold text-xs truncate">${i.title}</h4>
                                    <p class="mt-1 text-indigo-600 font-black text-sm">R$ ${i.price}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderProfile(s) {
            return `
                <div class="p-4 space-y-6 text-center">
                    <div class="py-8">
                        <div class="w-24 h-24 bg-indigo-600 rounded-3xl mx-auto shadow-xl shadow-indigo-100 flex items-center justify-center text-white text-4xl font-black mb-4">${s.userProfile?.name?.charAt(0)}</div>
                        <h3 class="text-xl font-black text-slate-900">${s.userProfile?.name}</h3>
                        <p class="text-slate-400 text-sm">${s.userProfile?.location}</p>
                    </div>
                    <div class="bg-white rounded-3xl border divide-y text-left overflow-hidden">
                        <div class="p-4 flex justify-between items-center text-sm font-bold text-slate-700"><span>Notificações</span><div class="w-10 h-5 bg-indigo-600 rounded-full flex items-center px-1"><div class="w-3 h-3 bg-white rounded-full ml-auto"></div></div></div>
                        <div class="p-4 flex justify-between items-center text-sm font-bold text-slate-700"><span>Privacidade</span><i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i></div>
                    </div>
                </div>
            `;
        }

        function renderGroupDetail(s) {
            const g = s.selectedGroup;
            const isMember = g.members?.includes(s.user?.uid);
            return `
                <div class="fixed inset-0 z-50 bg-white max-w-md mx-auto overflow-y-auto animate-in slide-in-from-right duration-300">
                    <div class="p-4 border-b flex items-center gap-4 sticky top-0 bg-white/90 backdrop-blur-md">
                        <button onclick="window.closeGroupDetail()" class="p-2"><i data-lucide="arrow-left"></i></button>
                        <h3 class="font-bold truncate">${g.name}</h3>
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="h-48 bg-indigo-600 rounded-[2rem] shadow-inner relative overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                            <div class="absolute bottom-6 left-6 text-white">
                                <span class="text-[10px] font-black uppercase tracking-widest opacity-80">${g.hobby}</span>
                                <h2 class="text-2xl font-black">${g.name}</h2>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 bg-slate-50 rounded-2xl border text-center font-black">
                                <p class="text-[9px] text-slate-400 uppercase mb-1">Membros</p>
                                <span class="text-xl">${g.members?.length || 0}</span>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl border text-center font-black">
                                <p class="text-[9px] text-slate-400 uppercase mb-1">Posts</p>
                                <span class="text-xl">12</span>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <h4 class="font-bold text-slate-800">Sobre a comunidade</h4>
                            <p class="text-sm text-slate-500 leading-relaxed">${g.description}</p>
                        </div>
                        <button onclick="window.joinGroup('${g.id}')" class="w-full py-4 rounded-2xl font-black text-white ${isMember ? 'bg-slate-200 text-slate-400' : 'bg-indigo-600 shadow-xl shadow-indigo-100'} active:scale-95 transition-all">
                            ${isMember ? 'Já sou Membro' : 'Participar Agora'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderBottomNav(s) {
            const tabs = [
                {id: 'discovery', icon: 'map', label: 'Explorar'},
                {id: 'groups', icon: 'users', label: 'Grupos'},
                {id: 'market', icon: 'shopping-bag', label: 'Mercado'},
                {id: 'profile', icon: 'user', label: 'Perfil'}
            ];
            return `
                <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t py-4 px-2 flex justify-around z-40">
                    ${tabs.map(t => `
                        <button onclick="window.switchTab('${t.id}')" class="flex flex-col items-center gap-1 ${s.activeTab === t.id ? 'text-indigo-600' : 'text-slate-400'}">
                            <i data-lucide="${t.icon}" class="w-6 h-6"></i>
                            <span class="text-[9px] font-black uppercase tracking-tighter">${t.label}</span>
                        </button>
                    `).join('')}
                </nav>
            `;
        }

        // --- Logica Global ---
        window.switchTab = (id) => { window.state.activeTab = id; window.state.selectedGroup = null; updateUI(); };
        window.selectGroup = (id) => { window.state.selectedGroup = window.state.groups.find(g => g.id === id); updateUI(); };
        window.closeGroupDetail = () => { window.state.selectedGroup = null; updateUI(); };
        
        window.joinGroup = async (id) => {
            if (!window.state.user) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'groups', id);
            await updateDoc(ref, { members: arrayUnion(window.state.user.uid) });
        };

        window.createDemoGroup = async () => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'groups'), {
                name: "Clube de Boardgames", hobby: "Games", description: "Encontros semanais para jogos de tabuleiro modernos e RPG.", members: [window.state.user.uid]
            });
        };

        window.createDemoProduct = async () => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'marketplace'), {
                title: "Kit de Aquarela Pro", category: "Artes", price: "120,00"
            });
        };

        // --- Inicialização ---
        async function start() {
            onAuthStateChanged(auth, (u) => {
                window.state.user = u;
                if (u) {
                    window.state.activeTab = 'discovery';
                    setupData(u.uid);
                }
            });
            await signInAnonymously(auth);
        }

        function setupData(uid) {
            const profRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');
            onSnapshot(profRef, (s) => {
                if (s.exists()) window.state.userProfile = s.data();
                else {
                    const d = { name: "Novo Vizinho", location: "Brasil" };
                    setDoc(profRef, d);
                    window.state.userProfile = d;
                }
                updateUI();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'groups'), (s) => {
                window.state.groups = s.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'marketplace'), (s) => {
                window.state.marketItems = s.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });
        }

        window.onload = start;
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-200">
    <div id="app-root"></div>
</body>
</html>
